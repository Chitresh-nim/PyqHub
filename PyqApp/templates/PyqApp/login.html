{% extends 'PyqApp/auth_base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
    {% if messages %}
        {% for message in messages %}
            <p> {{ message }}</p>
        {% endfor %}
    {% endif %}

        <h1> login </h1>
        <form method="POST">
            {% csrf_token %}

            <p> Email:</p>
            {{ form.email }}

            <p> Password</p>
            {{ form.password}}

            <button type="submit">
                Login
            </button>
        </form>
        <a href="{% url 'register' %}">Register</a>
{% endblock%}
