{% extends "PyqApp/layout.html"%}
{% block title %}Edit profile{% endblock %}

{% block content %}
{% if messages %}
        {% for message in messages %}
                {{ message }}
        {% endfor %}
{% endif %}
<div class="edit-profile-container">

<div class="profile-header">
    <h3>{{ request.user.username }}</h3>
    <img src="{{ profile.profile_picture.url }}" class="edit-profile-pic" width="120" id="profilePreview">
</div>
<div>
    <form method="POST" enctype="multipart/form-data" class="edit-profile-form">
        {% csrf_token %}
        <label>Change Profile Picture:</label>
        <input type="file", name="profile_picture" id="profileInput">
        <label>Change Name:</label>
        <input type="text", name="username", value="{{ request.user.username }}">
        <button type="submit">
            Save
        </button>

    </form>
</div>
</div>



{% endblock %}
