{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} {% endblock %}</title>
    <link rel="stylesheet" href="{% static 'PyqApp/css/styles.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <h3>AKTU PYQ HUB</h3>
        </div>
       <div class="nav-links">
            <a href="{% url 'home' %}">
                Home
            </a>
            <a href="{% url 'papers' %}">
                Papers
            </a>
            <a href="{% url 'dashboard' %}">
                My Account
            </a>
            {% if request.user.is_staff %}
                <a href="{% url 'admin_dash' %}">
                    Admin
                </a>
            {% endif %}
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="{% static 'PyqApp/js/script.js' %}"></script>
</body>
</html>
